<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="خزينة">
  <meta name="application-name" content="خزينة">
  <meta name="theme-color" content="#0D47A1">
  <title>خزينة السائق</title>

  <!-- manifest وأيقونات حقيقية على نفس النطاق -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">
  <link rel="apple-touch-icon" sizes="256x256" href="./icon-256.png">
  <link rel="apple-touch-icon" sizes="128x128" href="./icon-128.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0D47A1;
    }

    /* شاشة splash تظهر أثناء تحميل الـ iframe */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0D47A1 0%, #1E88E5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 10;
      transition: opacity .5s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
    .icon-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .app-name {
      font-size: 1.5rem; font-weight: 700;
      color: white;
      font-family: Arial, sans-serif;
    }
    .app-sub {
      font-size: .875rem;
      color: rgba(255,255,255,.72);
      font-family: Arial, sans-serif;
      margin-top: -10px;
    }
    .loader { display: flex; gap: 8px; }
    .loader span {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(255,255,255,.65);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: .2s; }
    .loader span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(.7); opacity: .5; }
      40%          { transform: scale(1.2); opacity: 1; }
    }

    /* الـ iframe يملأ الشاشة كاملاً */
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="splash">
    <div class="icon-wrap">
      <img src="./icon-512.png" alt="خزينة">
    </div>
    <div class="app-name">متابعة الخزينة</div>
    <div class="app-sub">السائق الميداني</div>
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- التطبيق الحقيقي داخل iframe -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbyNfUZFiSvlfcq-LebHphX1caW1pp0ZflDc4jDIHUFssbqPmy8_h3Gml2tlja_BPkiH/exec"
    allow="fullscreen"
  ></iframe>

  <script>
    // إخفاء splash بعد تحميل الـ iframe
    var frame = document.getElementById('app-frame');
    var splash = document.getElementById('splash');

    frame.addEventListener('load', function () {
      setTimeout(function () {
        splash.classList.add('hide');
      }, 600);
    });

    // احتياطي: إخفاء splash بعد 4 ثواني على أقصى تقدير
    setTimeout(function () {
      splash.classList.add('hide');
    }, 4000);
  </script>

</body>
</html>
