  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0D47A1 0%, #1E88E5 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      direction: rtl;
      overflow: hidden;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn .5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 100px; height: 100px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
      50%       { transform: scale(1.04); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    }
    .icon-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .app-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      letter-spacing: .02em;
    }
    .app-sub {
      font-size: .9rem;
      color: rgba(255,255,255,0.75);
      margin-top: -12px;
    }

    .loader {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .loader span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: .2s; }
    .loader span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: .5; }
      40%           { transform: scale(1.1); opacity: 1; }
    }

    .redirect-msg {
      font-size: .75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }
  </style>
</head>
